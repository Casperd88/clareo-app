name: Deploy Web to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/deploy-web-pages.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Bindings are wrangler-only for this project (dashboard is disabled). Optional
      # WAITLIST KV: create two namespaces (prod + preview), add both repo secrets, deploy.
      - name: Add WAITLIST KV to wrangler.toml
        env:
          WAITLIST_KV_ID: ${{ secrets.WAITLIST_KV_ID }}
          WAITLIST_KV_PREVIEW_ID: ${{ secrets.WAITLIST_KV_PREVIEW_ID }}
        run: |
          if [ -n "$WAITLIST_KV_ID" ] && [ -n "$WAITLIST_KV_PREVIEW_ID" ]; then
            {
              echo ""
              echo "[[kv_namespaces]]"
              echo 'binding = "WAITLIST"'
              echo "id = \"$WAITLIST_KV_ID\""
              echo "preview_id = \"$WAITLIST_KV_PREVIEW_ID\""
            } >> wrangler.toml
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=clareo
          workingDirectory: web
