# Cloudflare Pages — see functions/api/subscribe.js for bindings.
#
# This project is set to "bindings managed in wrangler.toml" in the dashboard, so
# you cannot add KV in the UI. To use WAITLIST (optional):
#   - CI: set repo secrets WAITLIST_KV_ID and WAITLIST_KV_PREVIEW_ID (see
#     deploy-web-pages.yml); or
#   - Commit [[kv_namespaces]] below with real hex ids; or
#   - For local only: add web/wrangler.local.toml (gitignored) with the same block.
# Invalid placeholder ids in this file break deploy (Error 8000022). Without KV,
# /api/subscribe still returns 200; set WEBHOOK_URL if you need storage.
#
# Local:  npm run build && npm run pages:dev
# Deploy: npm run pages:deploy

name = "clareo"
compatibility_date = "2024-12-01"
pages_build_output_dir = "dist"
