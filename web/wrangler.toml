# Cloudflare Pages — see functions/api/subscribe.js for bindings.
# Create a KV namespace in the dashboard, bind it to this Pages project as WAITLIST.
#
# Local:  npm run build && npm run pages:dev
# Deploy: npm run pages:deploy

name = "clareo"
compatibility_date = "2024-12-01"
pages_build_output_dir = "dist"

[[kv_namespaces]]
binding = "WAITLIST"
id = "REPLACE_WITH_WAITLIST_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_WAITLIST_KV_PREVIEW_NAMESPACE_ID"
